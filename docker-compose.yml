services:
  bot:
    build: .
    container_name: binance-futures-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_CONFIG_FILE: /app/config/application.yml
      TZ: Europe/Paris
    volumes:
      - ./deploy/application.yml:/app/config/application.yml:ro
      - ./var:/app/var
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
